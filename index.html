<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>King Travel | Official E-Ticket Voucher</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f9;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Font smoothing for better PDF rendering */
        .ticket-paper {
            background: white;
            padding: 1.2rem 1.5rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .app-container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        /* Header */
        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #eef2f8;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .logo-box {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #f0f6fe, #e8f0fa);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #2c7da0;
            overflow: hidden;
            border: 1px solid #d4e2f0;
            flex-shrink: 0;
        }
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .company-info {
            display: flex;
            flex-direction: column;
        }
        .company-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1e4663;
            letter-spacing: -0.3px;
        }
        .company-name i {
            color: #2c7da0;
            font-size: 1rem;
        }
        .company-tagline {
            font-size: 0.55rem;
            font-weight: 500;
            color: #7c98b3;
            letter-spacing: 0.3px;
        }
        
        .upload-control {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .upload-btn {
            background: #f0f4f9;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #2c7da0;
            cursor: pointer;
            font-family: inherit;
        }
        .file-name-hint {
            font-size: 0.6rem;
            color: #8aa0b5;
        }
        
        @media print {
            .upload-control, .upload-btn, .file-name-hint, #logoUpload {
                display: none !important;
            }
        }
        
        .e-ticket-badge {
            background: #2c7da0;
            color: white;
            padding: 5px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .e-ticket-badge i {
            color: white;
            margin-right: 5px;
        }

        /* Reference Row */
        .ref-hotline-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: #f8fbfe;
            padding: 0.6rem 1rem;
            border-radius: 16px;
            margin-bottom: 1.2rem;
            border: 1px solid #eef2f8;
        }
        .ref-box, .hotline-box {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        .ref-box .label, .hotline-box .label {
            font-weight: 700;
            color: #1e4663;
            font-size: 0.75rem;
        }
        .ref-box input, .hotline-box input {
            font-weight: 600;
            color: #2c7da0;
            border: none;
            background: transparent;
            font-size: 0.8rem;
            padding: 2px 6px;
            font-family: inherit;
        }

        /* Section Title */
        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #2c7da0;
            margin: 0.8rem 0 0.5rem 0;
            padding-bottom: 4px;
            border-bottom: 2px solid #e2eaf1;
            display: inline-block;
        }
        .section-title i {
            margin-right: 6px;
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .info-card {
            background: #fafdff;
            border-radius: 14px;
            padding: 0.7rem 0.9rem;
            border: 1px solid #eef2f8;
        }
        .info-item {
            margin-bottom: 0.6rem;
        }
        .info-item label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #7c98b3;
            display: block;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .info-item .value {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e2f3f;
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            padding: 4px 0;
        }
        .info-item input.value {
            border-bottom: 1px dashed #d4e2f0;
            width: 100%;
        }
        .info-item input.value:focus {
            outline: none;
            border-bottom-color: #2c7da0;
        }

        /* Two Column */
        .two-col-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 0.6rem 0;
        }
        .passenger-card, .special-card {
            background: #fafdff;
            border-radius: 14px;
            padding: 0.7rem 0.9rem;
            border: 1px solid #eef2f8;
        }
        .passenger-card .section-title, .special-card .section-title {
            margin-top: 0;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
        }

        /* Summary Row */
        .summary-row {
            display: flex;
            gap: 1rem;
            background: #f8fbfe;
            padding: 0.7rem 1rem;
            border-radius: 16px;
            margin: 0.6rem 0;
            border: 1px solid #eef2f8;
        }
        .summary-item {
            flex: 1;
        }
        .summary-item label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #7c98b3;
            display: block;
        }
        .summary-item input {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e4663;
            border: none;
            background: transparent;
            width: 100%;
            padding: 4px 0;
            font-family: inherit;
        }

        /* Footer */
        .footer-voucher {
            text-align: center;
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: linear-gradient(135deg, #f0f6fe, #e8f0fa);
            border-radius: 18px;
        }
        .footer-voucher h3 {
            color: #2c7da0;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .footer-voucher p {
            font-size: 0.65rem;
            color: #5f7f9e;
        }
        .support-contact {
            margin-top: 6px;
            font-weight: 600;
            color: #1f5e7e;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .support-contact span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .support-contact i {
            font-size: 0.75rem;
            color: #2c7da0;
        }
        .support-contact input {
            border: none;
            background: transparent;
            font-weight: 600;
            color: #1f5e7e;
            font-size: 0.75rem;
            font-family: inherit;
            padding: 2px 4px;
        }

        .download-btn {
            background: #2c7da0;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .download-btn:hover {
            background: #1f5e7e;
        }

        textarea.value {
            width: 100%;
            border: 1px solid #e2e9f2;
            border-radius: 12px;
            padding: 6px 8px;
            font-size: 0.8rem;
            resize: vertical;
            background: #fefefe;
            font-family: inherit;
        }

        /* PDF Generation Force Desktop View Styles */
        .html2pdf__page-rendering .ticket-paper {
            width: 880px !important;
            padding: 1.5rem 2rem !important;
        }
        .html2pdf__page-rendering .info-grid, 
        .html2pdf__page-rendering .two-col-layout {
            grid-template-columns: 1fr 1fr !important;
            gap: 0.8rem !important;
        }

        /* Responsive Screen Only */
        @media (max-width: 600px) {
            .ticket-paper {
                padding: 0.8rem;
            }
            .two-col-layout {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            .info-grid {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            .company-name {
                font-size: 1rem;
            }
            .ref-box input, .hotline-box input {
                max-width: 130px;
            }
            .support-contact {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="ticket-paper" id="ticketContent">
        <div class="ticket-header">
            <div class="logo-area">
                <div class="logo-box" id="logoPreview">
                    <i class="fas fa-bus-simple"></i>
                </div>
                <div class="company-info">
                    <div class="company-name"><i class="fas fa-crown"></i> King Travel</div>
                    <div class="company-tagline">Travel & Ticket Services</div>
                </div>
                <div class="upload-control" id="uploadControls">
                    <input type="file" id="logoUpload" accept="image/png, image/jpeg" style="display:none;" />
                    <button class="upload-btn" id="triggerLogoUpload"><i class="fas fa-cloud-upload-alt"></i> Choose</button>
                    <span class="file-name-hint" id="fileNameHint">No file</span>
                </div>
            </div>
            <div class="e-ticket-badge"><i class="fas fa-ticket-alt"></i> E-TICKET</div>
        </div>

        <div class="ref-hotline-row">
            <div class="ref-box">
                <span class="label"><i class="fas fa-hashtag"></i> REF NO:</span>
                <input type="text" id="refNo" value="#KT-100239">
            </div>
            <div class="hotline-box">
                <span class="label"><i class="fas fa-headset"></i> Agent Hotline:</span>
                <input type="text" id="agentHotline" value="+95 9 446627892">
            </div>
        </div>

        <h3 class="section-title"><i class="fas fa-map-marked-alt"></i> TRIP INFORMATION</h3>
        <div class="info-grid">
            <div class="info-card">
                <div class="info-item"><label>BUS OPERATOR</label><input type="text" id="busOperator" class="value" value="Elite, JJ Express"></div>
                <div class="info-item"><label>BUS TYPE</label><input type="text" id="busType" class="value" value="2+1 VIP High-Class"></div>
                <div class="info-item"><label>JOURNEY (FROM - TO)</label><input type="text" id="journeyFromTo" class="value" value="Yangon → Mandalay"></div>
            </div>
            <div class="info-card">
                <div class="info-item"><label>DEPARTURE DATE & TIME</label><input type="text" id="departureDateTime" class="value" value="09:00 PM (15.8.2026)"></div>
                <div class="info-item"><label>ARRIVAL DATE & TIME</label><input type="text" id="arrivalDateTime" class="value" value="06:00 AM (16.8.2026)"></div>
                <div class="info-item"><label>ROUTE / HIGHWAY</label><input type="text" id="routeDetail" class="value" value="Yangon-Mandalay Expressway"></div>
            </div>
        </div>

        <div class="two-col-layout">
            <div class="passenger-card">
                <h3 class="section-title" style="margin-top:0; border-bottom:none;"><i class="fas fa-user-check"></i> PASSENGER DETAILS</h3>
                <div class="info-item"><label>TRAVELLER NAME</label><input type="text" id="travellerName" class="value" value="Mg Mg"></div>
                <div class="info-item"><label>SEAT NO(S)</label><input type="text" id="seatNo" class="value" value="A1, A2"></div>
                <div class="info-item"><label>PHONE NUMBER</label><input type="tel" id="phoneNumber" class="value" value="09......"></div>
            </div>
            <div class="special-card">
                <h3 class="section-title" style="margin-top:0; border-bottom:none;"><i class="fas fa-pen-alt"></i> SPECIAL REQUEST</h3>
                <div class="info-item"><label>REQUEST TO BUS OPERATOR</label><textarea id="specialRequest" rows="2" class="value">Prefer window seat, etc...</textarea></div>
                <div class="info-item"><label><i class="fas fa-phone"></i> BUS OPERATOR PHONE</label><input type="tel" id="busOperatorPhone" class="value" value="09 123 456 789" placeholder="Bus operator contact number"></div>
            </div>
        </div>

        <div class="summary-row">
            <div class="summary-item"><label><i class="fas fa-chair"></i> NUMBER OF SEATS</label><input type="number" id="numSeats" value="2" min="1"></div>
            <div class="summary-item"><label><i class="fas fa-coins"></i> TOTAL AMOUNT</label><input type="text" id="totalAmount" value="60,000 MMK"></div>
        </div>

        <div class="footer-voucher">
            <h3><i class="fas fa-crown"></i> KING TRAVEL</h3>
            <p>AUTHORIZED TICKETING VOUCHER</p>
            <p>Thank you for choosing King Travel. Have a safe journey!</p>
            <div class="support-contact">
                <span><i class="fas fa-phone-alt"></i> <input type="text" id="supportPhone" value="09446627892"></span>
                <span><i class="fas fa-envelope"></i> <input type="text" id="supportEmail" value="kingtravel99@gmail.com"></span>
            </div>
        </div>
    </div>

    <div style="padding: 0 1.5rem 1.2rem 1.5rem; background: white;">
        <button class="download-btn" id="downloadPDFBtn"><i class="fas fa-file-pdf"></i> Download PDF (E-Ticket)</button>
    </div>
</div>

<script>
    const logoUpload = document.getElementById('logoUpload');
    const triggerLogo = document.getElementById('triggerLogoUpload');
    const logoPreview = document.getElementById('logoPreview');
    const fileNameHint = document.getElementById('fileNameHint');
    const downloadBtn = document.getElementById('downloadPDFBtn');
    const ticketContent = document.getElementById('ticketContent');
    const uploadControls = document.getElementById('uploadControls');

    triggerLogo.addEventListener('click', () => logoUpload.click());
    logoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && (file.type === 'image/png' || file.type === 'image/jpeg')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                logoPreview.innerHTML = `<img src="${ev.target.result}" alt="Logo" style="width:100%; height:100%; object-fit:contain;">`;
                fileNameHint.textContent = file.name.length > 12 ? file.name.substring(0, 10) + '...' : file.name;
            };
            reader.readAsDataURL(file);
        } else if (file) {
            alert("Please upload PNG or JPG file.");
        }
    });

    async function generatePDF() {
        const originalDisplay = uploadControls.style.display;
        uploadControls.style.display = 'none';
        
        const element = ticketContent;
        const opt = {
            margin: [0.3, 0.3, 0.3, 0.3],
            filename: `KingTravel_${document.getElementById('refNo').value.replace(/[#\s]/g, '') || 'eticket'}.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { 
                scale: 2.5,                  // Balance sharpness and mobile performance
                letterRendering: true,       
                useCORS: true,
                logging: false,
                backgroundColor: '#ffffff',
                windowWidth: 880,            // Force HTML2Canvas to capture at 880px desktop layout width
                scrollX: 0,
                scrollY: 0
            },
            jsPDF: { 
                unit: 'in', 
                format: 'a4', 
                orientation: 'portrait',
                compress: true
            }
        };
        
        try {
            await html2pdf().set(opt).from(element).save();
        } catch (err) {
            console.error("PDF error:", err);
            alert("PDF generation failed. Please try again.");
        } finally {
            uploadControls.style.display = originalDisplay;
        }
    }

    downloadBtn.addEventListener('click', () => {
        const ref = document.getElementById('refNo').value.trim();
        if (!ref && !confirm("Reference No is empty. Continue?")) return;
        generatePDF();
    });
</script>
</body>
</html>
